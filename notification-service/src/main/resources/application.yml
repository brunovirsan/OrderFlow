spring:
  application:
    name: notification-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/notificationdb}
    username: ${SPRING_DATASOURCE_USERNAME:notification}
    password: ${SPRING_DATASOURCE_PASSWORD:notification123}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: java.lang.Object
    listener:
      ack-mode: manual
server:
  port: 8083
management:
  endpoints:
    web:
      exposure:
        include: health,info
logging:
  pattern:
    level: "%5p [correlationId:%X{correlationId:-}]"
app:
  kafka:
    topics:
      order-created: order.created
      order-confirmed: order.confirmed
      order-ready: order.ready
      order-cancelled: order.cancelled
