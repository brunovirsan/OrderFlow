spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: order-service
          uri: ${app.services.order-service-uri:http://localhost:8081}
          predicates:
            - Path=/api/v1/orders/**
        - id: kitchen-service
          uri: ${app.services.kitchen-service-uri:http://localhost:8082}
          predicates:
            - Path=/api/v1/kitchen/**

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  services:
    order-service-uri: ${ORDER_SERVICE_URI:http://localhost:8081}
    kitchen-service-uri: ${KITCHEN_SERVICE_URI:http://localhost:8082}
